name: Apply Adaptive Flock Scheduler Hook

on:
  push:
    branches:
      - codex/adaptive-flock-subagents
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'push'
        with:
          ref: codex/adaptive-flock-subagents
          persist-credentials: true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Apply scheduler routing hook
        run: python scripts/apply_adaptive_flock_scheduler_hook.py
      - name: Install validation dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r config/python-build-bootstrap.txt
          python -m pip install --no-build-isolation -e '.[dev,keyring]'
          python -m pip check
      - name: Validate scheduler routing seam
        run: |
          ruff check --fix \
            src/nested_memvid_agent/run_manager.py \
            src/nested_memvid_agent/routing \
            tests/test_agent_routing_foundation.py \
            tests/test_agent_routing_guardrails.py \
            tests/test_agent_routing_ledger.py \
            tests/test_agent_routing_cancellation.py \
            tests/test_agent_routing_metadata.py \
            tests/test_adaptive_flock_run_manager.py \
            tests/test_adaptive_flock_start_failures.py \
            tests/test_adaptive_flock_scheduler_hook.py
          ruff check scripts src tests
          mypy src
          python -m compileall -q src tests scripts
          pytest -q \
            tests/test_agent_routing_foundation.py \
            tests/test_agent_routing_guardrails.py \
            tests/test_agent_routing_ledger.py \
            tests/test_agent_routing_cancellation.py \
            tests/test_agent_routing_metadata.py \
            tests/test_adaptive_flock_run_manager.py \
            tests/test_adaptive_flock_start_failures.py \
            tests/test_adaptive_flock_scheduler_hook.py
      - name: Commit validated scheduler seam
        if: github.event_name == 'push'
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: route autonomous scheduler workers"
          git push origin HEAD:codex/adaptive-flock-subagents
