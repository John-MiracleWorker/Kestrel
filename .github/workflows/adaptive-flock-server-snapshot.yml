name: Adaptive Flock Control Diagnostics

on:
  push:
    branches:
      - codex/adaptive-flock-control-plane

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      NEST_AGENT_VALIDATION_CONTAINER_IMAGE: "python@sha256:5c34b355088846dddc8afb7442c20b9433dccdc8d66192dc52c616adeaa106a3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install diagnostics dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r config/python-build-bootstrap.txt
          python -m pip install --no-build-isolation -e '.[dev,memvid,mcp,keyring]'
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check scripts src tests > ruff-output.txt 2>&1
          printf '%s\n' "$?" > ruff-exit-code.txt
          exit 0
      - name: Capture Memvid golden diagnostics
        shell: bash
        run: |
          set +e
          docker pull "$NEST_AGENT_VALIDATION_CONTAINER_IMAGE" > docker-pull.txt 2>&1
          python scripts/run_golden_evals.py \
            --backend memvid \
            --provider mock \
            --memory-dir "${RUNNER_TEMP}/kestrel-memvid-golden" \
            --max-case-latency-ms 45000 \
            > golden-output.txt 2>&1
          printf '%s\n' "$?" > golden-exit-code.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adaptive-flock-control-diagnostics-${{ github.sha }}
          path: |
            ruff-output.txt
            ruff-exit-code.txt
            golden-output.txt
            golden-exit-code.txt
            docker-pull.txt
            src/nested_memvid_agent/server.py
          if-no-files-found: error
          retention-days: 1
