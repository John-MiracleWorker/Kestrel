name: Apply Adaptive Flock Server Integration

on:
  push:
    branches:
      - codex/adaptive-flock-control-plane
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      NEST_AGENT_VALIDATION_CONTAINER_IMAGE: "python@sha256:5c34b355088846dddc8afb7442c20b9433dccdc8d66192dc52c616adeaa106a3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'push'
        with:
          ref: codex/adaptive-flock-control-plane
          persist-credentials: true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Apply deterministic integration patch
        run: |
          python - <<'PY'
          from pathlib import Path

          server = Path("src/nested_memvid_agent/server.py")
          text = server.read_text(encoding="utf-8")
          replacements = {
              "from .routines import RoutineService\nfrom .run_manager import RunCapacityError, RunManager\n": (
                  "from .routines import RoutineService\n"
                  "from .routing.runtime import build_run_manager\n"
                  "from .run_manager import RunCapacityError\n"
              ),
              "        from .server_routine_routes import register_routine_routes\n"
              "        from .server_runtime_routes import register_runtime_routes\n": (
                  "        from .server_routine_routes import register_routine_routes\n"
                  "        from .server_routing_routes import register_routing_routes\n"
                  "        from .server_runtime_routes import register_runtime_routes\n"
              ),
              "    runs = RunManager(\n"
              "        config=active_config,\n"
              "        state=state,\n"
              "        events=events,\n"
              "        mcp=mcp,\n"
              "        skills=skills,\n"
              "        plugins=plugins,\n"
              "        secret_resolver=secret_broker.resolve,\n"
              "        enforce_single_owner=True,\n"
              "        auto_start=False,\n"
              "    )\n": (
                  "    run_manager_build = build_run_manager(\n"
                  "        config=active_config,\n"
                  "        state=state,\n"
                  "        events=events,\n"
                  "        mcp=mcp,\n"
                  "        skills=skills,\n"
                  "        plugins=plugins,\n"
                  "        secret_resolver=secret_broker.resolve,\n"
                  "        enforce_single_owner=True,\n"
                  "        auto_start=False,\n"
                  "    )\n"
                  "    runs = run_manager_build.runs\n"
                  "    routing_ledger = run_manager_build.routing_ledger\n"
                  "    routing_config = run_manager_build.routing_config\n"
              ),
              "    register_routine_routes(\n        app,\n": (
                  "    register_routing_routes(\n"
                  "        app,\n"
                  "        ledger=routing_ledger,\n"
                  "        runtime=routing_config,\n"
                  "        http_exception=HTTPException,\n"
                  "    )\n"
                  "    register_routine_routes(\n"
                  "        app,\n"
              ),
          }
          for marker, replacement in replacements.items():
              count = text.count(marker)
              if count != 1:
                  raise SystemExit(f"server integration marker count was {count}: {marker[:80]!r}")
              text = text.replace(marker, replacement, 1)
          server.write_text(text, encoding="utf-8")

          tests = Path("tests/test_adaptive_flock_control_plane.py")
          test_text = tests.read_text(encoding="utf-8")
          old_assertion = "        assert type(build.runs) is RunManager\n"
          if test_text.count(old_assertion) != 1:
              raise SystemExit("exact RunManager assertion marker not found")
          test_text = test_text.replace(
              old_assertion,
              "        assert build.runs.__class__ is RunManager\n",
              1,
          )
          import_marker = (
              "from nested_memvid_agent.run_manager import RunManager\n"
              "from nested_memvid_agent.server_routing_routes import register_routing_routes\n"
          )
          if test_text.count(import_marker) != 1:
              raise SystemExit("control-plane server import marker not found")
          test_text = test_text.replace(
              import_marker,
              "from nested_memvid_agent.run_manager import RunManager\n"
              "from nested_memvid_agent.server import create_app\n"
              "from nested_memvid_agent.server_routing_routes import register_routing_routes\n",
              1,
          )
          integration_test = '''\n\ndef test_create_app_registers_default_off_routing_control_plane(\n    tmp_path: Path, monkeypatch: pytest.MonkeyPatch\n) -> None:\n    fastapi_testclient = pytest.importorskip("fastapi.testclient")\n    monkeypatch.setenv("NEST_AGENT_ENABLE_ADAPTIVE_FLOCK", "false")\n    monkeypatch.setenv("NEST_AGENT_ADAPTIVE_FLOCK_MODE", "shadow")\n    config = AgentConfig(\n        provider="mock",\n        model="mock",\n        state_path=tmp_path / "state" / "agent.db",\n        memory_dir=tmp_path / "memory",\n        log_dir=tmp_path / "logs",\n        workspace=tmp_path,\n        skills_dir=tmp_path / "skills",\n        plugins_dir=tmp_path / "plugins",\n        require_api_auth=False,\n    )\n\n    with fastapi_testclient.TestClient(create_app(config)) as client:\n        response = client.get("/api/routing/status")\n\n    assert response.status_code == 200\n    assert response.json()["runtime"] == {\n        "enabled": False,\n        "mode": "off",\n        "policy_id": "balanced",\n    }\n'''
          if "test_create_app_registers_default_off_routing_control_plane" in test_text:
              raise SystemExit("server integration test already exists")
          tests.write_text(test_text + integration_test, encoding="utf-8")

          Path(".github/workflows/adaptive-flock-server-snapshot.yml").unlink()
          PY
      - name: Install validation dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r config/python-build-bootstrap.txt
          python -m pip install --no-build-isolation -e '.[dev,memvid,mcp,keyring]'
          python -m pip check
      - name: Auto-fix and validate Python
        run: |
          ruff check --fix scripts src tests
          ruff check scripts src tests
          mypy src
          python -m compileall -q src tests scripts
      - name: Run focused Adaptive Flock tests
        run: |
          pytest -q \
            tests/test_agent_routing_foundation.py \
            tests/test_agent_routing_guardrails.py \
            tests/test_agent_routing_ledger.py \
            tests/test_agent_routing_outcome_semantics.py \
            tests/test_agent_routing_metadata.py \
            tests/test_adaptive_flock_run_manager.py \
            tests/test_adaptive_flock_run_manager_hardening.py \
            tests/test_adaptive_flock_control_plane.py \
            tests/test_adaptive_flock_env_config.py \
            tests/test_adaptive_flock_preview.py
      - name: Run Memvid golden validation
        run: |
          docker pull "$NEST_AGENT_VALIDATION_CONTAINER_IMAGE"
          python scripts/run_golden_evals.py \
            --backend memvid \
            --provider mock \
            --memory-dir "${RUNNER_TEMP}/kestrel-memvid-golden" \
            --max-case-latency-ms 45000
      - name: Commit validated integration
        if: github.event_name == 'push'
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: wire Adaptive Flock into server runtime"
          git push origin HEAD:codex/adaptive-flock-control-plane
