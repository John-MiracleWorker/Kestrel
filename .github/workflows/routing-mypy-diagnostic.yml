name: Routing Mypy Diagnostic

on:
  pull_request:
  push:
    branches:
      - codex/adaptive-flock-ledger

permissions:
  contents: read

jobs:
  mypy-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r config/python-build-bootstrap.txt
          python -m pip install --no-build-isolation -e '.[dev,keyring]'
      - name: Capture mypy output
        shell: bash
        run: |
          set +e
          mypy src > mypy-output.txt 2>&1
          status=$?
          printf '%s\n' "$status" > mypy-exit-code.txt
          exit 0
      - name: Upload mypy report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adaptive-flock-mypy-${{ github.sha }}
          path: |
            mypy-output.txt
            mypy-exit-code.txt
          if-no-files-found: error
          retention-days: 1
