name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: Ruff
        run: ruff check scripts src tests
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest -q
      - name: Golden evals
        run: python scripts/run_golden_evals.py --backend memory --provider mock
