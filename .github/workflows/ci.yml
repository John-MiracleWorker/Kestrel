name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: Ruff
        run: ruff check scripts src tests
      - name: Mypy
        run: mypy src
      - name: Bandit high-severity gate
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: bandit -q -r src -lll -iii
      - name: ShellCheck
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: shellcheck install.sh scripts/*.sh
      - name: Tests
        run: pytest -q
      - name: Golden evals
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: python scripts/run_golden_evals.py --backend memory --provider mock

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.x"
          cache: false
      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Audit web dependencies
        run: npm audit --audit-level=high
        working-directory: web
      - name: Test web
        run: npm test
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web

  docker:
    runs-on: ubuntu-latest
    needs:
      - python
      - web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Docker build
        run: docker build -t kestrel-agent:ci .
