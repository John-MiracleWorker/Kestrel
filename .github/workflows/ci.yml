name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Scan candidate source for secrets
        env:
          GITLEAKS_IMAGE: "zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"
        run: |
          docker pull "$GITLEAKS_IMAGE"
          docker run --rm -v "$PWD:/repo" -w /repo "$GITLEAKS_IMAGE" \
            dir --redact=100 --no-banner .

  python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.11"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.11"
    runs-on: ${{ matrix.os }}
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: Validate project metadata
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: python scripts/check_project_metadata.py
      - name: Ruff
        run: ruff check scripts src tests
      - name: Mypy
        run: mypy src
      - name: Bandit high-severity gate
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: bandit -q -r src -lll -iii
      - name: ShellCheck
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: shellcheck install.sh scripts/*.sh
      - name: Tests
        run: pytest -q
      - name: Golden evals
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: python scripts/run_golden_evals.py --backend memory --provider mock
      - name: End-to-end agent learning gate
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        run: |
          ruff check benchmarks/real_agent_learning_benchmark.py tests/test_real_agent_learning_benchmark.py
          MYPYPATH=src mypy --strict benchmarks/real_agent_learning_benchmark.py
          python benchmarks/real_agent_learning_benchmark.py \
            --output "${RUNNER_TEMP}/agent-learning-gate.json"

  foundational-integrations:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      RUN_MEMVID_INTEGRATION: "1"
      RUN_MCP_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install credential-free integration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,memvid,mcp]'
          python -m pip check
      - name: Test Memvid v2 and stdio MCP foundations
        run: >-
          python -m pytest -q
          tests/integration/test_memvid_backend_integration.py
          tests/integration/test_memvid_memory_system.py
          tests/integration/test_memvid_context_frames.py
          tests/integration/test_mcp_stdio_integration.py
      - name: Run Memvid v2 golden evaluations
        run: >-
          python scripts/run_golden_evals.py
          --backend memvid
          --provider mock
          --memory-dir "${RUNNER_TEMP}/kestrel-memvid-golden"

  extension-sandbox:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      RUN_EXTENSION_SANDBOX_INTEGRATION: "1"
      KESTREL_EXTENSION_TEST_IMAGE: "python@sha256:5c34b355088846dddc8afb7442c20b9433dccdc8d66192dc52c616adeaa106a3"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pip check
      - name: Preload digest-pinned extension image
        run: docker pull "$KESTREL_EXTENSION_TEST_IMAGE"
      - name: Test executable-skill OCI containment
        run: python -m pytest -q tests/integration/test_extension_container_integration.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.x"
          cache: false
      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Verify bundled dependency notices
        run: npm run licenses:check
        working-directory: web
      - name: Audit web dependencies
        run: npm audit --audit-level=high
        working-directory: web
      - name: Test web
        run: npm test
        working-directory: web
      - name: Build web
        run: npm run build
        working-directory: web

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          languages: python,javascript-typescript
          build-mode: none
          queries: security-extended
      - name: Analyze source
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1

  docker:
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - python
      - foundational-integrations
      - extension-sandbox
      - web
      - codeql
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Docker build
        run: docker build -t kestrel-agent:ci .
      - name: Verify container privilege and license controls
        run: >-
          docker run --rm --entrypoint /bin/sh kestrel-agent:ci -c
          'set -eu;
          test "$(id -u)" = 999;
          test -f /app/LICENSE;
          test -f /app/web/dist/THIRD_PARTY_NOTICES.txt;
          test ! -u /usr/bin/mount;
          test ! -u /usr/bin/umount;
          test ! -u /usr/bin/su'
      - name: Scan and enforce container vulnerability policy
        env:
          TRIVY_IMAGE: "aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f"
        run: |
          docker pull "$TRIVY_IMAGE"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$RUNNER_TEMP:/reports" \
            "$TRIVY_IMAGE" image \
            --skip-version-check \
            --scanners vuln \
            --pkg-types os,library \
            --format json \
            --output /reports/kestrel-container-trivy.json \
            kestrel-agent:ci
          python scripts/check_container_vulnerabilities.py \
            "$RUNNER_TEMP/kestrel-container-trivy.json" \
            --exceptions config/container_vulnerability_exceptions.json
