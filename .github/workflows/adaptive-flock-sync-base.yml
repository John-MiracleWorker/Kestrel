name: Sync Adaptive Flock Scheduler Base

on:
  push:
    branches:
      - codex/adaptive-flock-control-plane
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: codex/adaptive-flock-control-plane
          persist-credentials: ${{ github.event_name == 'push' }}
          fetch-depth: 0
      - name: Merge current scheduler-routing base
        shell: bash
        run: |
          git fetch origin codex/adaptive-flock-subagents
          set +e
          git merge --no-ff --no-commit origin/codex/adaptive-flock-subagents
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            printf 'Resolving expected Adaptive Flock conflicts:\n%s\n' "$conflicts"
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                src/nested_memvid_agent/routing/__init__.py)
                  git checkout --ours -- "$path"
                  ;;
                src/nested_memvid_agent/run_manager.py|\
                src/nested_memvid_agent/routing/contracts.py|\
                src/nested_memvid_agent/routing/run_manager.py|\
                src/nested_memvid_agent/routing/ledger.py|\
                src/nested_memvid_agent/routing/ledger_serialization.py|\
                tests/test_adaptive_flock_start_failures.py|\
                tests/test_adaptive_flock_scheduler_hook.py|\
                tests/test_agent_routing_foundation.py|\
                tests/test_agent_routing_cancellation.py|\
                tests/test_agent_routing_metadata.py)
                  git checkout --theirs -- "$path"
                  ;;
                *)
                  printf 'Unexpected merge conflict: %s\n' "$path" >&2
                  exit 1
                  ;;
              esac
              git add "$path"
            done <<< "$conflicts"
            remaining="$(git diff --name-only --diff-filter=U)"
            if [ -n "$remaining" ]; then
              printf 'Unresolved conflicts remain:\n%s\n' "$remaining" >&2
              exit 1
            fi
          fi
          rm .github/workflows/adaptive-flock-sync-base.yml
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r config/python-build-bootstrap.txt
          python -m pip install --no-build-isolation -e '.[dev,memvid,mcp,keyring]'
          python -m pip check
      - name: Auto-fix Ruff findings
        run: ruff check --fix scripts src tests
      - name: Validate Ruff
        run: ruff check scripts src tests
      - name: Validate mypy
        run: mypy src
      - name: Validate compilation
        run: python -m compileall -q src tests scripts
      - name: Run focused Adaptive Flock tests
        run: |
          pytest -q \
            tests/test_agent_routing_foundation.py \
            tests/test_agent_routing_guardrails.py \
            tests/test_agent_routing_ledger.py \
            tests/test_agent_routing_cancellation.py \
            tests/test_agent_routing_metadata.py \
            tests/test_adaptive_flock_run_manager.py \
            tests/test_adaptive_flock_start_failures.py \
            tests/test_adaptive_flock_scheduler_hook.py \
            tests/test_adaptive_flock_control_plane.py \
            tests/test_adaptive_flock_env_config.py \
            tests/test_adaptive_flock_preview.py
      - name: Run memory golden validation
        run: |
          python scripts/run_golden_evals.py \
            --backend memory \
            --provider mock \
            --max-case-latency-ms 45000
      - name: Commit validated base sync
        if: github.event_name == 'push'
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync Adaptive Flock scheduler routing"
          git push origin HEAD:codex/adaptive-flock-control-plane
