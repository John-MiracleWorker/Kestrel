name: Bug report
description: Report a broken behavior in Kestrel
title: '[Bug]: '
labels:
    - bug
body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: Describe the failure in one clear paragraph.
          placeholder: What broke, where, and how often does it happen?
      validations:
          required: true

    - type: dropdown
      id: area
      attributes:
          label: Affected area
          options:
              - Gateway
              - Brain
              - Hands
              - Web
              - Desktop
              - CLI or daemon
              - Shared contracts
              - Docs
              - CI or GitHub
      validations:
          required: true

    - type: dropdown
      id: mode
      attributes:
          label: Run mode
          options:
              - Docker-first
              - Native
              - Hybrid
              - Hosted or remote environment
              - Not sure
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Reproduction steps
          description: List the exact commands, UI actions, or webhook path needed to reproduce the bug.
          placeholder: |
              1. Start the stack with ...
              2. Open ...
              3. Trigger ...
              4. Observe ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
          placeholder: What should have happened instead?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
          placeholder: What happened instead, including error messages?
      validations:
          required: true

    - type: textarea
      id: env
      attributes:
          label: Environment details
          description: Include OS, package versions, branch or commit, and any relevant configuration differences.
          placeholder: macOS 15, Node 20, Python 3.11, Docker Desktop, branch main
      validations:
          required: true

    - type: textarea
      id: logs
      attributes:
          label: Logs or screenshots
          description: Paste the shortest useful logs or screenshots. Remove secrets before posting.
          render: shell

    - type: checkboxes
      id: checks
      attributes:
          label: Before submitting
          options:
              - label: I searched for existing issues covering the same failure
                required: true
              - label: I removed secrets and sensitive tokens from the report
                required: true
