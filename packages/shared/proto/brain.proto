syntax = "proto3";

package kestrel.brain;

// Brain service handles LLM inference, user management, and data CRUD
service BrainService {
  // Stream chat completions with tool calling support
  rpc StreamChat(ChatRequest) returns (stream ChatResponse);

  // Health check endpoint
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // ── User Management ──────────────────────────────────────────
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);

  // ── Workspace CRUD ───────────────────────────────────────────
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (WorkspaceResponse);

  // ── Conversation CRUD ────────────────────────────────────────
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc CreateConversation(CreateConversationRequest) returns (ConversationResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc UpdateConversation(UpdateConversationRequest) returns (ConversationResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  rpc GenerateTitle(GenerateTitleRequest) returns (GenerateTitleResponse);
  // ── Mobile / Sync ────────────────────────────────────────────
  rpc RegisterPushToken(RegisterPushTokenRequest) returns (RegisterPushTokenResponse);
  rpc GetUpdates(GetUpdatesRequest) returns (GetUpdatesResponse);

  // ── Provider Configuration ───────────────────────────────────
  rpc ListProviderConfigs(ListProviderConfigsRequest) returns (ListProviderConfigsResponse);
  rpc SetProviderConfig(SetProviderConfigRequest) returns (SetProviderConfigResponse);
  rpc DeleteProviderConfig(DeleteProviderConfigRequest) returns (DeleteProviderConfigResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // ── Autonomous Agent ────────────────────────────────────────
  rpc StartTask(StartTaskRequest) returns (stream TaskEvent);
  rpc StreamTaskEvents(StreamTaskEventsRequest) returns (stream TaskEvent);
  rpc ApproveAction(ApproveActionRequest) returns (ApproveActionResponse);
  rpc ListPendingApprovals(ListPendingApprovalsRequest) returns (ListPendingApprovalsResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc GetTaskDetail(GetTaskDetailRequest) returns (GetTaskDetailResponse);
  rpc ListTaskTimeline(ListTaskTimelineRequest) returns (ListTaskTimelineResponse);
  rpc ListTaskCheckpoints(ListTaskCheckpointsRequest) returns (ListTaskCheckpointsResponse);
  rpc ListTaskArtifacts(ListTaskArtifactsRequest) returns (ListTaskArtifactsResponse);
  rpc GetApprovalAudit(GetApprovalAuditRequest) returns (GetApprovalAuditResponse);
  rpc ListOperatorTasks(ListOperatorTasksRequest) returns (ListOperatorTasksResponse);

  // ── Workflows ──────────────────────────────────────────────
  rpc LaunchWorkflow(LaunchWorkflowRequest) returns (stream TaskEvent);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc RunHeadlessTask(RunHeadlessTaskRequest) returns (RunHeadlessTaskResponse);

  // ── Capabilities ───────────────────────────────────────────
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc GetMemoryGraph(GetMemoryGraphRequest) returns (GetMemoryGraphResponse);
  rpc GetRuntimeProfile(GetRuntimeProfileRequest) returns (GetRuntimeProfileResponse);

  // ── Moltbook Activity ─────────────────────────────────────
  rpc GetMoltbookActivity(GetMoltbookActivityRequest) returns (GetMoltbookActivityResponse);

  // ── Automation ──────────────────────────────────────────────
  rpc ListProcesses(ListProcessesRequest) returns (ListProcessesResponse);
  rpc ParseCronJob(ParseCronJobRequest) returns (ParseCronJobResponse);
}

// ═══════════════════════════════════════════════════════════════
// Chat messages
// ═══════════════════════════════════════════════════════════════

message ChatRequest {
  string user_id = 1;
  string workspace_id = 2;
  string conversation_id = 3;
  repeated Message messages = 4;
  string provider = 5; // "local", "openai", "anthropic", "google"
  string model = 6;
  map<string, string> parameters = 7; // temperature, max_tokens, etc.
  repeated Tool available_tools = 8;
}

message Message {
  enum Role {
    USER = 0;
    ASSISTANT = 1;
    SYSTEM = 2;
    TOOL = 3;
  }

  Role role = 1;
  string content = 2;
  string tool_call_id = 3;
  repeated ToolCall tool_calls = 4;
}

message Tool {
  string name = 1;
  string description = 2;
  string parameters_schema = 3; // JSON schema as string
}

message ToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3; // JSON string
}

message ChatResponse {
  enum ChunkType {
    CONTENT_DELTA = 0;
    TOOL_CALL = 1;
    DONE = 2;
    ERROR = 3;
  }

  ChunkType type = 1;
  string content_delta = 2;
  ToolCall tool_call = 3;
  string error_message = 4;
  map<string, string> metadata = 5;
}

// ═══════════════════════════════════════════════════════════════
// Health check
// ═══════════════════════════════════════════════════════════════

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  map<string, string> status = 3;
}

// ═══════════════════════════════════════════════════════════════
// User Management
// ═══════════════════════════════════════════════════════════════

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message WorkspaceMembership {
  string id = 1;
  string role = 2;
}

message AuthenticateUserResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
  repeated WorkspaceMembership workspaces = 4;
}

// ═══════════════════════════════════════════════════════════════
// Workspace CRUD
// ═══════════════════════════════════════════════════════════════

message ListWorkspacesRequest {
  string user_id = 1;
}

message WorkspaceResponse {
  string id = 1;
  string name = 2;
  string role = 3;
  string created_at = 4;
}

message ListWorkspacesResponse {
  repeated WorkspaceResponse workspaces = 1;
}

message CreateWorkspaceRequest {
  string user_id = 1;
  string name = 2;
}

// ═══════════════════════════════════════════════════════════════
// Conversation CRUD
// ═══════════════════════════════════════════════════════════════

message ListConversationsRequest {
  string user_id = 1;
  string workspace_id = 2;
}

message ConversationResponse {
  string id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
  string channel = 5;   // "web", "telegram", "discord", etc.
}

message ListConversationsResponse {
  repeated ConversationResponse conversations = 1;
}

message CreateConversationRequest {
  string user_id = 1;
  string workspace_id = 2;
}

message GetMessagesRequest {
  string user_id = 1;
  string workspace_id = 2;
  string conversation_id = 3;
}

message MessageResponse {
  string id = 1;
  string role = 2;
  string content = 3;
  string created_at = 4;
}

message GetMessagesResponse {
  repeated MessageResponse messages = 1;
}

message UpdateConversationRequest {
  string user_id = 1;
  string workspace_id = 2;
  string conversation_id = 3;
  string title = 4;
}

message DeleteConversationRequest {
  string user_id = 1;
  string workspace_id = 2;
  string conversation_id = 3;
}

message DeleteConversationResponse {
  bool success = 1;
}

message GenerateTitleRequest {
  string user_id = 1;
  string workspace_id = 2;
  string conversation_id = 3;
}

message GenerateTitleResponse {
  string title = 1;
}

// ═══════════════════════════════════════════════════════════════
// Mobile / Sync
// ═══════════════════════════════════════════════════════════════

message RegisterPushTokenRequest {
  string user_id = 1;
  string device_token = 2;
  string platform = 3; // "ios", "android", "web"
}

message RegisterPushTokenResponse {
  bool success = 1;
}

message GetUpdatesRequest {
  string user_id = 1;
  string since = 2; // ISO timestamp
}

message GetUpdatesResponse {
  repeated MessageResponse messages = 1;
  repeated ConversationResponse conversations = 2;
}

// ═══════════════════════════════════════════════════════════════
// Provider Configuration
// ═══════════════════════════════════════════════════════════════

message ProviderConfig {
  string workspace_id = 1;
  string provider = 2;
  string model = 3;
  float temperature = 4;
  int32 max_tokens = 5;
  string system_prompt = 6;
  bool rag_enabled = 7;
  int32 rag_top_k = 8;
  float rag_min_similarity = 9;
  bool is_default = 10;
  string api_key_encrypted = 11;
  string created_at = 12;
  string updated_at = 13;
}

message ListProviderConfigsRequest {
  string workspace_id = 1;
}

message ListProviderConfigsResponse {
  repeated ProviderConfig configs = 1;
}

message SetProviderConfigRequest {
  string workspace_id = 1;
  string provider = 2;
  string model = 3;
  float temperature = 4;
  int32 max_tokens = 5;
  string system_prompt = 6;
  bool rag_enabled = 7;
  int32 rag_top_k = 8;
  float rag_min_similarity = 9;
  bool is_default = 10;
  string api_key_encrypted = 11; // Optional: only if updating key
}

message SetProviderConfigResponse {
  ProviderConfig config = 1;
}

message DeleteProviderConfigRequest {
  string workspace_id = 1;
  string provider = 2;
}

message DeleteProviderConfigResponse {
  bool success = 1;
}

message ListModelsRequest {
  string provider = 1;
  string api_key = 2; // Optional: use if not configured in workspace
  string workspace_id = 3;
}

message Model {
  string id = 1;
  string name = 2; // Display name or description
  string context_window = 3;
}

message ListModelsResponse {
  repeated Model models = 1;
}

message ListToolsRequest {
  string workspace_id = 1;
}

message ToolMetadata {
  string name = 1;
  string description = 2;
  string category = 3;
  string risk_level = 4;
  bool enabled = 5;
}

message ListToolsResponse {
  repeated ToolMetadata tools = 1;
}

// ═══════════════════════════════════════════════════════════════
// Autonomous Agent
// ═══════════════════════════════════════════════════════════════

message StartTaskRequest {
  string user_id = 1;
  string workspace_id = 2;
  string goal = 3;                    // Natural language goal
  string conversation_id = 4;        // Optional: link to conversation
  GuardrailConfig guardrails = 5;    // Optional: custom limits
}

message GuardrailConfig {
  int32 max_iterations = 1;          // Default: 25
  int32 max_tool_calls = 2;          // Default: 50
  int32 max_tokens = 3;              // Default: 100000
  int32 max_wall_time_seconds = 4;   // Default: 600
  string auto_approve_risk = 5;      // "low", "medium", "high", "critical"
  repeated string blocked_patterns = 6;
  repeated string require_approval_tools = 7;
}

message TaskEvent {
  enum EventType {
    PLAN_CREATED = 0;
    STEP_STARTED = 1;
    TOOL_CALLED = 2;
    TOOL_RESULT = 3;
    STEP_COMPLETE = 4;
    APPROVAL_NEEDED = 5;
    THINKING = 6;
    TASK_COMPLETE = 7;
    TASK_FAILED = 8;
    TASK_PAUSED = 9;
  }

  EventType type = 1;
  string task_id = 2;
  string step_id = 3;
  string content = 4;               // Thinking text, result, error
  string tool_name = 5;
  string tool_args = 6;             // JSON string
  string tool_result = 7;
  string approval_id = 8;
  map<string, string> progress = 9; // current_step, total_steps, etc.
  string event_metadata_json = 10;  // Structured execution/task metadata as JSON
  string metrics_json = 11;         // Structured metrics payload as JSON
}

message StreamTaskEventsRequest {
  string task_id = 1;
  string user_id = 2;
}

message ApproveActionRequest {
  string approval_id = 1;
  string user_id = 2;
  bool approved = 3;                // true = approve, false = deny
}

message ApproveActionResponse {
  bool success = 1;
  string error = 2;
}

message ListPendingApprovalsRequest {
  string user_id = 1;
  string workspace_id = 2;
}

message PendingApprovalSummary {
  string approval_id = 1;
  string task_id = 2;
  string tool_name = 3;
  string reason = 4;
  string created_at = 5;
}

message ListPendingApprovalsResponse {
  repeated PendingApprovalSummary approvals = 1;
}

message CancelTaskRequest {
  string task_id = 1;
  string user_id = 2;
}

message CancelTaskResponse {
  bool success = 1;
}

message ListTasksRequest {
  string user_id = 1;
  string workspace_id = 2;
  string status = 3;                // Optional filter: "executing", "complete", etc.
}

message TaskSummary {
  string id = 1;
  string goal = 2;
  string status = 3;
  int32 iterations = 4;
  int32 tool_calls = 5;
  string result = 6;
  string error = 7;
  string created_at = 8;
  string completed_at = 9;
}

message ListTasksResponse {
  repeated TaskSummary tasks = 1;
}

message GetTaskDetailRequest {
  string workspace_id = 1;
  string user_id = 2;
  string task_id = 3;
}

message ExecutionTraceSummary {
  string runtime_class = 1;
  string risk_class = 2;
  string fallback_summary = 3;
  repeated string recent_tools = 4;
  string last_event_at = 5;
}

message TaskArtifactReference {
  string id = 1;
  string title = 2;
  string component_type = 3;
  int32 version = 4;
  string updated_at = 5;
  string data_source = 6;
}

message RecoveryHint {
  string code = 1;
  string title = 2;
  string description = 3;
}

message TaskDetail {
  string id = 1;
  string goal = 2;
  string status = 3;
  int32 iterations = 4;
  int32 tool_calls = 5;
  string result = 6;
  string error = 7;
  string created_at = 8;
  string completed_at = 9;
  string workspace_id = 10;
  string user_id = 11;
  string conversation_id = 12;
  string current_step = 13;
  string total_steps = 14;
  string pending_approval_id = 15;
  string pending_approval_tool = 16;
  string last_checkpoint_id = 17;
  string last_checkpoint_label = 18;
  string last_checkpoint_at = 19;
  ExecutionTraceSummary execution = 20;
  repeated TaskArtifactReference artifact_refs = 21;
  bool stale = 22;
  bool orphaned = 23;
  repeated RecoveryHint recovery_hints = 24;
}

message GetTaskDetailResponse {
  TaskDetail task = 1;
}

message ListTaskTimelineRequest {
  string workspace_id = 1;
  string user_id = 2;
  string task_id = 3;
}

message TaskTimelineItem {
  string type = 1;
  string task_id = 2;
  string step_id = 3;
  string content = 4;
  string tool_name = 5;
  string tool_args = 6;
  string tool_result = 7;
  string approval_id = 8;
  map<string, string> progress = 9;
  string event_metadata_json = 10;
  string metrics_json = 11;
  string created_at = 12;
}

message ListTaskTimelineResponse {
  repeated TaskTimelineItem events = 1;
}

message ListTaskCheckpointsRequest {
  string workspace_id = 1;
  string user_id = 2;
  string task_id = 3;
}

message TaskCheckpointItem {
  string id = 1;
  int32 step_index = 2;
  string label = 3;
  string created_at = 4;
}

message ListTaskCheckpointsResponse {
  repeated TaskCheckpointItem checkpoints = 1;
}

message ListTaskArtifactsRequest {
  string workspace_id = 1;
  string user_id = 2;
  string task_id = 3;
}

message TaskArtifactItem {
  string id = 1;
  string title = 2;
  string description = 3;
  string component_type = 4;
  int32 version = 5;
  string updated_at = 6;
  string created_by = 7;
  string data_source = 8;
}

message ListTaskArtifactsResponse {
  repeated TaskArtifactItem artifacts = 1;
}

message GetApprovalAuditRequest {
  string workspace_id = 1;
  string user_id = 2;
  string task_id = 3;
  string status = 4;
}

message ApprovalAuditItem {
  string approval_id = 1;
  string task_id = 2;
  string step_id = 3;
  string tool_name = 4;
  string reason = 5;
  string risk_level = 6;
  string status = 7;
  string decided_by = 8;
  string decided_at = 9;
  string created_at = 10;
  string tool_args_json = 11;
}

message GetApprovalAuditResponse {
  repeated ApprovalAuditItem approvals = 1;
}

message ListOperatorTasksRequest {
  string workspace_id = 1;
  string user_id = 2;
  string status = 3;
}

message OperatorTaskItem {
  TaskSummary summary = 1;
  int32 pending_approval_count = 2;
  bool stale = 3;
  bool orphaned = 4;
  string current_step = 5;
  string total_steps = 6;
  string lease_expires_at = 7;
  string queue_status = 8;
  string conversation_id = 9;
}

message ListOperatorTasksResponse {
  repeated OperatorTaskItem tasks = 1;
}

// ═══════════════════════════════════════════════════════════════
// Workflows
// ═══════════════════════════════════════════════════════════════

message LaunchWorkflowRequest {
  string workflow_id = 1;
  string user_id = 2;
  string workspace_id = 3;
  map<string, string> variables = 4;
  string conversation_id = 5;
}

message RunHeadlessTaskRequest {
  string workspace_id = 1;
  string user_id = 2;
  string goal = 3;
  string expected_schema_json = 4;  // JSON schema for output
  GuardrailConfig guardrails = 5;
}

message RunHeadlessTaskResponse {
  bool success = 1;
  string result_json = 2;  // The parsed JSON output matching schema
  string error = 3;
  int32 iterations = 4;
}

// ═══════════════════════════════════════════════════════════════
// Moltbook Activity
// ═══════════════════════════════════════════════════════════════

message GetMoltbookActivityRequest {
  string workspace_id = 1;
  int32 limit = 2;           // Default: 20
}

message MoltbookActivityItem {
  string id = 1;
  string action = 2;         // "post", "comment", "upvote", etc.
  string title = 3;
  string content = 4;
  string submolt = 5;
  string post_id = 6;
  string url = 7;
  string created_at = 8;
}

message GetMoltbookActivityResponse {
  repeated MoltbookActivityItem activity = 1;
}

// ── Workflows ──────────────────────────────────────────────────────

message ListWorkflowsRequest {
  string workspace_id = 1;
  string category = 2;  // optional filter
}

message WorkflowItem {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string category = 5;
  string goal_template = 6;
  repeated string tags = 7;
}

message ListWorkflowsResponse {
  repeated WorkflowItem workflows = 1;
}

// ── Capabilities ───────────────────────────────────────────────────

message GetCapabilitiesRequest {
  string workspace_id = 1;
}

message CapabilityItem {
  string name = 1;
  string description = 2;
  string status = 3;        // "active", "available", "disabled"
  string category = 4;      // "intelligence", "safety", "automation", "tools"
  string icon = 5;
  map<string, string> stats = 6;  // flexible key-value stats
}

message GetCapabilitiesResponse {
  repeated CapabilityItem capabilities = 1;
}

message GetMemoryGraphRequest {
  string workspace_id = 1;
  string user_id = 2;
}

message MemoryGraphNode {
  string id = 1;
  string label = 2;
  string entity_type = 3;
  string description = 4;
  int32 weight = 5;
  int32 mentions = 6;
  string last_seen = 7;
  double x = 8;
  double y = 9;
}

message MemoryGraphLink {
  string source = 1;
  string target = 2;
  string relation = 3;
}

message GetMemoryGraphResponse {
  repeated MemoryGraphNode nodes = 1;
  repeated MemoryGraphLink links = 2;
}

message GetRuntimeProfileRequest {
  string workspace_id = 1;
  string user_id = 2;
  bool include_sensitive = 3;
}

message RuntimeMount {
  string path = 1;
  string mode = 2;
}

message RuntimeSubsystem {
  string name = 1;
  string status = 2;
  string detail = 3;
}

message ProviderRoutingItem {
  string provider = 1;
  string model = 2;
  bool is_default = 3;
  string source = 4;
}

message RuntimeProfile {
  string runtime_mode = 1;
  string policy_name = 2;
  string policy_version = 3;
  bool docker_enabled = 4;
  bool native_enabled = 5;
  bool hybrid_fallback_visible = 6;
  repeated RuntimeMount host_mounts = 7;
  repeated RuntimeSubsystem subsystems = 8;
  repeated ProviderRoutingItem provider_routes = 9;
  map<string, string> runtime_capabilities = 10;
}

message GetRuntimeProfileResponse {
  RuntimeProfile profile = 1;
}

// ── Automation ─────────────────────────────────────────────────────

message ParseCronJobRequest {
  string prompt = 1;
  string workspace_id = 2;
}

message ParseCronJobResponse {
  string cron = 1;
  string human_schedule = 2;
  string task = 3;
}

message ListProcessesRequest {
  string workspace_id = 1;
}

message ProcessSummary {
  string id = 1;
  string name = 2;
  string type = 3;
  string status = 4;
  string cron = 5;
  string last_run = 6;
  string next_run = 7;
  int32 run_count = 8;
  string last_result = 9;
  string branch = 10;
  string error = 11;
}

message ListProcessesResponse {
  repeated ProcessSummary processes = 1;
  int32 running = 2;
}
